<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Текущее время</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #111;
            color: #00ffcc;
            font-family: Arial, sans-serif;
        }
        #time {
            font-size: 48px;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="time"></div>

<script>
    function updateTime() {
        const now = new Date();

        const date = now.toLocaleDateString();
        const time = now.toLocaleTimeString();

        document.getElementById("time").innerHTML = date + "<br>" + time;
    }

    setInterval(updateTime, 1000);
    updateTime();
</script>

</body>
</html>
