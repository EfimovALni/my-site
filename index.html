<script>
    const MOJE_HESLO = "1234";

    function checkPass() {
        const input = document.getElementById('pass-input').value.trim();

        if (input === MOJE_HESLO) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';

            refresh();
            setInterval(refresh, 1000);
        } else {
            alert("Nesprávný kód!");
        }
    }

    function refresh() {
        const selector = document.getElementById('city-selector');
        const selection = selector.value.split('|');

        const timeZone = selection[0];
        const locale = selection[1];

        const now = new Date();

        const timeFormatter = new Intl.DateTimeFormat(locale, {
            timeZone: timeZone,
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
        });

        const dateFormatter = new Intl.DateTimeFormat(locale, {
            timeZone: timeZone,
            weekday: 'long',
            day: 'numeric',
            month: 'long'
        });

        document.getElementById('clock').innerText = timeFormatter.format(now);
        document.getElementById('date').innerText = dateFormatter.format(now);

        const currentText = selector.options[selector.selectedIndex].text;

        // ❗ ВАЖНО: исправлено (были пропущены обратные кавычки)
        document.getElementById('location').innerText = `Lokalita: ${currentText}`;
    }

    function toggleFS() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => {});
        } else {
            document.exitFullscreen().catch(() => {});
        }
    }

    // ENTER работает везде (ПК + мобилки с клавиатурой)
    document.getElementById('pass-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            checkPass();
        }
    });

    // Автофокус (удобно на ПК)
    window.onload = () => {
        document.getElementById('pass-input').focus();
    };
</script>
