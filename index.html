<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Globální přesné hodiny</title>
    <style>
        :root {
            --bg: #000;
            --text: #fff;
            --accent: #00e5ff;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* --- PŘIHLAŠOVACÍ OBRAZOVKA --- */
        #auth-screen {
            position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #auth-screen input {
            background: #111; border: 1px solid #333; color: #fff;
            padding: 15px; font-size: 1.5rem; text-align: center; border-radius: 8px;
            margin-bottom: 20px; width: 280px; outline: none;
        }
        #auth-screen button {
            background: var(--accent); color: #000; border: none;
            padding: 12px 45px; font-weight: bold; cursor: pointer; border-radius: 5px;
        }

        /* --- HLAVNÍ ROZHRANÍ --- */
        #main-content { display: none; width: 100%; height: 100%; flex-direction: column; }

        nav {
            position: absolute; top: 0; width: 100%; padding: 20px;
            display: flex; justify-content: center; gap: 15px;
            z-index: 10; opacity: 0; transition: opacity 0.3s;
        }
        body:hover nav { opacity: 1; }

        select, button.fs {
            background: #1a1a1a; color: #fff; border: 1px solid #333;
            padding: 10px 15px; border-radius: 5px; cursor: pointer;
        }

        /* --- DISPLEJ HODIN --- */
        .display {
            flex: 1; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        #clock {
            font-size: 16vw;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin: 0;
            line-height: 1;
        }

        #date {
            font-size: 2vw;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 15px;
        }

        #location {
            color: var(--accent);
            font-size: 1.3vw;
            margin-top: 20px;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <input type="password" id="pass-input" placeholder="Zadejte heslo">
        <button onclick="checkPass()">VSTOUPIT</button>
    </div>

    <div id="main-content">
        <nav>
            <select id="city-selector" onchange="refresh()">
                <optgroup label="Česká republika">
                    <option value="Europe/Prague|cs-CZ">Praha (CZ)</option>
                </optgroup>
                <optgroup label="Rusko (Sibiř)">
                    <option value="Asia/Novosibirsk|ru-RU">Prokopjevsk (RU)</option>
                    <option value="Asia/Novosibirsk|ru-RU">Letiště Tolmačevo OVB (RU)</option>
                </optgroup>
                <optgroup label="Mezinárodní letiště">
                    <option value="Europe/Vienna|cs-CZ">Letiště Vídeň (VIE)</option>
                    <option value="Europe/Istanbul|cs-CZ">Letiště Istanbul (IST)</option>
                </optgroup>
                <optgroup label="Ostatní svět">
                    <option value="Europe/Moscow|ru-RU">Moskva (RU)</option>
                    <option value="Europe/London|en-GB">Londýn (UK)</option>
                    <option value="America/New_York|en-US">New York (US)</option>
                </optgroup>
            </select>
            <button class="fs" onclick="toggleFS()">⛶ Celá obrazovka</button>
        </nav>

        <div class="display" onclick="toggleFS()">
            <div id="clock">00:00:00</div>
            <div id="date">---</div>
            <div id="location">---</div>
        </div>
    </div>

<script>
    const MOJE_HESLO = "91542229";

    function checkPass() {
        const input = document.getElementById('pass-input').value;
        if (input === MOJE_HESLO) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'flex';
            setInterval(refresh, 1000);
            refresh();
        } else {
            alert("Nesprávný kód!");
        }
    }

    function refresh() {
        const selection = document.getElementById('city-selector').value.split('|');
        const timeZone = selection[0];
        const locale = selection[1];
        const now = new Date();

        const timeFormatter = new Intl.DateTimeFormat(locale, {
            timeZone: timeZone,
            hour: '2-digit', minute: '2-digit', second: '2-digit',
            hour12: false
        });

        const dateFormatter = new Intl.DateTimeFormat(locale, {
            timeZone: timeZone,
            weekday: 'long', day: 'numeric', month: 'long'
        });

        document.getElementById('clock').innerText = timeFormatter.format(now);
        document.getElementById('date').innerText = dateFormatter.format(now);
        
        const currentText = document.getElementById('city-selector').options[document.getElementById('city-selector').selectedIndex].text;
        document.getElementById('location').innerText = Lokalita: ${currentText};
    }

    function toggleFS() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }

    document.getElementById('pass-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') checkPass();
    });
</script>
</body>
</html>
