<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ламповые часы + мини-игра</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #2b1d13, #090604 70%);
      color: #ffd28a;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
    }

    .app {
      width: 100%;
      max-width: 900px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      font-size: clamp(24px, 5vw, 44px);
      color: #ffe0a3;
      text-shadow: 0 0 15px #ff8c00;
    }

    .clock {
      background: rgba(40, 20, 5, 0.85);
      border: 2px solid #ff9d00;
      border-radius: 24px;
      padding: 25px;
      margin-bottom: 25px;
      box-shadow:
        0 0 25px #ff7b00,
        inset 0 0 20px rgba(255, 150, 0, 0.3);
    }

    .time {
      font-size: clamp(42px, 12vw, 110px);
      font-weight: bold;
      letter-spacing: 6px;
      color: #ffb347;
      text-shadow:
        0 0 8px #ff7b00,
        0 0 20px #ff4500,
        0 0 40px #ff2200;
    }

    .date {
      margin-top: 10px;
      font-size: clamp(16px, 4vw, 26px);
      color: #ffe0a3;
    }

    .game {
      position: relative;
      width: 100%;
      height: 300px;
      background: rgba(0, 0, 0, 0.35);
      border: 2px solid #9c5b12;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: inset 0 0 25px rgba(255, 153, 0, 0.2);
    }

    .score {
      margin-bottom: 12px;
      font-size: 22px;
    }

    .firefly {
      position: absolute;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff8b0, #ffb300, #ff6a00);
      box-shadow:
        0 0 15px #fff000,
        0 0 35px #ff9900,
        0 0 60px #ff6600;
      cursor: pointer;
      transition: 0.2s;
      animation: pulse 1s infinite alternate;
    }

    @keyframes pulse {
      from {
        transform: scale(1);
      }
      to {
        transform: scale(1.15);
      }
    }

    .hint {
      margin-top: 15px;
      font-size: 16px;
      color: #ffd28a;
      opacity: 0.8;
    }

    @media (max-width: 600px) {
      body {
        padding: 12px;
      }

      .clock {
        padding: 18px;
      }

      .game {
        height: 260px;
      }

      .firefly {
        width: 48px;
        height: 48px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <h1>Ламповые часы</h1>

    <section class="clock">
      <div class="time" id="time">00:00:00</div>
      <div class="date" id="date">Загрузка даты...</div>
    </section>

    <div class="score">Очки: <span id="score">0</span></div>

    <section class="game" id="game">
      <div class="firefly" id="firefly"></div>
    </section>

    <p class="hint">Мини-игра: нажимай на светящийся шарик и набирай очки.</p>
  </main>

  <script>
    const timeElement = document.getElementById("time");
    const dateElement = document.getElementById("date");

    function updateClock() {
      const now = new Date();

      const hours = String(now.getHours()).padStart(2, "0");
      const minutes = String(now.getMinutes()).padStart(2, "0");
      const seconds = String(now.getSeconds()).padStart(2, "0");

      timeElement.textContent = `${hours}:${minutes}:${seconds}`;

      dateElement.textContent = now.toLocaleDateString("ru-RU", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric"
      });
    }

    setInterval(updateClock, 1000);
    updateClock();

    const game = document.getElementById("game");
    const firefly = document.getElementById("firefly");
    const scoreElement = document.getElementById("score");

    let score = 0;

    function moveFirefly() {
      const gameWidth = game.clientWidth;
      const gameHeight = game.clientHeight;

      const fireflySize = firefly.offsetWidth;

      const maxX = gameWidth - fireflySize;
      const maxY = gameHeight - fireflySize;

      const randomX = Math.floor(Math.random() * maxX);
      const randomY = Math.floor(Math.random() * maxY);

      firefly.style.left = randomX + "px";
      firefly.style.top = randomY + "px";
    }

    firefly.addEventListener("click", () => {
      score++;
      scoreElement.textContent = score;
      moveFirefly();
    });

    window.addEventListener("resize", moveFirefly);

    moveFirefly();
  </script>
</body>
</html>
